name: Common Publish

on:
  workflow_call:
    inputs:
      timeout-minutes:
        required: false
        type: number
        default: 60
      deploy-env:
        required: true
        type: string
        default: qual
      publish:
        required: true
        type: boolean
        default: false

jobs:
  project_build:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment: ${{ inputs.deploy-env }}
    permissions:
      id-token: write
      contents: read
      actions: read
      checks: write
      deployments: write
      issues: write
      packages: write
      pull-requests: write
      repository-projects: write
      security-events: write
      statuses: write
    
    steps:
      ##############################
      # Build & deploy
      ##############################
      # Get access to github repository
      - uses: actions/checkout@v7.0.0
        id: checkout
        with:
          fetch-depth: 0

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.14.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11
    
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash
  
      - name: Run Unit Tests
        run: pnpm test
        shell: bash
  
      - name: Run linter
        run: pnpm lint
        shell: bash
  
      - name: Run build
        env: 
          GTAG: ${{ secrets.GTAG }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
        run: pnpm build
        shell: bash

      # --- START OF THE ROBUST DEPLOYMENT LOGIC ---

      - name: Inject Static and Public Assets into Standalone Folder
        if: ${{ inputs.publish == true }}
        run: |
          # 1. Copy the client-side compiled files into the standalone folder
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/
          
          # 2. Copy public assets into the standalone folder
          if [ -d "public" ]; then
            mkdir -p .next/standalone/public
            cp -r public/. .next/standalone/public/
          fi
        shell: bash

      - name: Setup SSH Private Key
        if: ${{ inputs.publish == true }}
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: 'unnecessary'
          if_key_exists: replace

      - name: Deploy Standalone App via Rsync
        if: ${{ inputs.publish == true }}
        run: |
          # Create target directory on VPS if it doesn't exist
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }} "mkdir -p /home/${{ secrets.SSH_USER }}/audiolinx-${{ inputs.deploy-env }}"
          
          # Sync everything securely inside .next/standalone/ directly into the target app folder
          # --delete ensures deleted files in repo don't accumulate on server
          rsync -atv --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            .next/standalone/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }}:/home/${{ secrets.SSH_USER }}/audiolinx-${{ inputs.deploy-env }}/
        shell: bash

      - name: Restart PM2 Process on VPS
        if: ${{ inputs.publish == true }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }} "
            # Load NVM or global node environment if needed
            [ -s \"\$HOME/.nvm/nvm.sh\" ] && \. \"\$HOME/.nvm/nvm.sh\"
          
            cd /home/${{ secrets.SSH_USER }}/audiolinx-${{ inputs.deploy-env }}
          
            # Zero-downtime restart via PM2
            pm2 describe audiolinx-${{ inputs.deploy-env }} > /dev/null 2>&1
            if [ \$? -eq 0 ]; then
              echo 'App is running. Reloading...'
              pm2 reload audiolinx-${{ inputs.deploy-env }} --update-env
            else
              echo 'App is not running. Starting...'
              PORT=8080 pm2 start server.js --name 'audiolinx-${{ inputs.deploy-env }}'
            fi
            pm2 save
          "
        shell: bash


          